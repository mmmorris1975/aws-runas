run:
  concurrency: 4
  timeout: 5m

issues:
  exclude-rules:
    # Exclude some linters from running on tests files.
    - path: _test\.go
      linters:
        - funlen
        - gocognit
        - gocyclo
        - unused

linters-settings:
  funlen:
    lines: 75
    statements: 50
  gocognit:
    min-complexity: 15
  gocyclo:
    min-complexity: 15
  govet:
    enable:
      - shadow
  lll:
    line-length: 132

linters:
  disable-all: true
  enable:
    # These are the default linters
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused

    # These are some of the not enabled by default linters, which we may or may not enable
    - bodyclose
    #- depguard
    #- dogsled
    #- dupl
    #- exhaustive
    - funlen
    #- gochecknoinits
    #- goconst
    - gocritic
    - gocognit
    - gocyclo
    - godot
    - gofmt
    #- goimports
    #- gomnd
    #- goprintffuncname
    - gosec
    #- interfacer
    #- lll
    #- misspell
    #- nakedret
    - noctx
    #- nolintlint
    #- prealloc
    #- rowserrcheck
    #- scopelint
    #- stylecheck
    - unconvert
    - unparam
    #- whitespace